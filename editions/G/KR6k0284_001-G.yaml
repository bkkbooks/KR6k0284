body:
  text: 弘一初序分闕二正宗初題號初題目二述號二本文初總列篇名二隨篇別釋初敬本教興篇二濟時護法篇三因機立儀篇後標云隨機立教篇四乘心行事篇五寄緣真俗篇六引教徵迹篇後標云引教徵事篇七約時科節篇八威儀有序篇後標云威容有儀篇九功用感通篇後標云功用顯迹篇十程器陳迹篇三流通初敬本教興篇初篇目二本文初佛出本意二歸敬教興初因迷立教二覩相回心三總陳教意初觀教立言二引文誠證初總舉要門初總舉二圓配初敬明觀初身事理二心事理二觀攬誠教二反覆徵推初重示身心過患二再伸觀智警迷二引文誠證初結前生後二正引誠文初引二論明敬本初通引二論二引四文證教興二合示三法三引三藏明相敬二引四文證教興初信首宗本初引經正示二結意顯宗三引論轉釋初解歸意二敬儀萌兆初引經二立歸法二結示三伸誡約三點釋三位列敬相初引文二結示三勸誡初正誡四致敬因本初引文二勸行二結示三引證三類顯三引三藏明相敬初總標二別示初律示正儀初立法緣起二正示敬儀二引經伸誡三因引古事初篇竟二濟時護法篇初篇目二本文初立篇大意二教起元由初妄情流墮二徵顯迷悟三積習難悛四引經策勵五對教勸修初舉智校量二約報加勸三立寶彰異初大聖立教二祖述濟時初示廣述正因二明三寶相狀初敘意總分二隨相別釋初一體二緣理三化相四住持初一體初標二釋初前佛已成三結二後修隨證三警發今機初敘一體以顯由緣初釋名二示體初從真起妄初正明二引經二反妄入真初勸起修三所述文意二示修法初總明三學二別顯戒因初約三聚離明二約心用合辨初用一心圓解二約一戒圓具二釋三寶以明性相初標三示離合教意初身隨教別二釋初正明二教隨時分二勸誡三伸問答以除疑執初不立理智問二識心即理答初正答二結勸二緣理初標二釋初正明理體初明佛寶初正明二略法僧二結示二能生化相初本末功用三結二隱顯隨機初明體相初明體二示相初解五分相二示可歸初寶喻尊特二簡顯勝用二專信成歸三示三寶相三會異名三別解歸意四顯功益五誡輕慢三化相初標二釋初正明體用初辨名體初示別名二明體狀二顯功益初紹隆佛化二生起住持初正明二法利羣生二勸信四住持初標二釋初顯相推功初正推初僧二欣遇二法二約體推敬初示體推功三佛二喻顯須敬三責過勸行四引文重示三躡示敬法初正明初事初剋境寄修二隨緣標立二理初寄緣真俗二結誡二因修顯立二篇竟三隨機立教篇初篇目二本文初略示禮名二正明機教初明機初學識寡陋二膠固情堅三躡過勸誡三結示綱宗二示教初佛教隨機初正示初總張兩教二勸依二別示淨方初方智合明二法喻雙顯二祖述事理初生起三淨穢均融二誡妄三引事示意初正明三正明初總示要門二點示二因教開解三引教對機三篇竟四乘心行事篇初篇目二本文初敘由勸誡初結前生後初約報正勸二心事廣明二引聖況凡二結法顯名三立理勸誡三約事伸誡初約顯明初明心使二示毒本初丈夫論初引證三勸防護初貪二賢愚經二例顯二對敬明初敘正意二瞋三七種禮二配三毒三癡三顯因果初推業因初示意三三性合辨二明雜報二引證四篇竟初總示形心五寄緣真俗篇初篇目二配真俗初形真俗二本文三躡法勸修二心真俗四因修顯證初總敘由致初敘二諦所由二準聖教行敬初敘意生起二立理勸修初立理二引論正示二責勸初責迷想見三正明修法初總標二勸悟形心二別顯三引喻伸誡四躡教勸修初事儀初道場資具初牒示事觀初須說事意二依事正修二不說理意二觀行初總示觀門二引歸唯識初引會二統會事理三總結圓修二正明四問答釋疑初約真俗別觀問二約修證不同答初凡聖圓修答初正明二證唯在聖答二勸誡三引經教類顯五篇竟六引教徵事篇初篇目二本文初假問興由初須通大致二約教略釋初略陳大意二勸起聖行二引教區分初標定教宗二廣顯四依初約經總明三指文結略二別開三位初人四依初標二釋初正明迷悟二法四依初敘意生起二勸令正修二依經顯相三結示篇意初聖智高妙初正出法體二經證有階初依法不依人初標二斥時迷倒三責迷顯悟二釋三準教策修四遣執示道二依義不依語初標五勸學誡迷二釋初示法體二教雙遣三依智不依識初標三勸思擇初示識相二釋初總示法體二示智體二問答廣明初躡前伸問四依了義經不依不了義經初標二約義答釋二釋初通示二義三行四依初標二別示兩經初轉遣執情二重示勝道二釋初了義經初明經二示義初正出法體二不了義經初標定二決示因果二徵釋三結意指略六篇竟七約時科節篇初篇目二本文初敘顯正修二約時接俗初示論意初論因迷立二人昧執文三約事徵顯四引經符論二明祖意初初心暫節二久習須常三起行差殊初凡情欣捨二要行宗歸三人情各計四會同三學初佛示教源二弟子進學初總明眾行二別就敬明初標斥二正配初約惑明二約敬配初正配三學二責迷分教三約戒配五結勸常修七篇竟八威容有儀篇初篇目二本文初立教勸行初聖軌宜遵二策修加勸初約世報策修二引經書勸發二方土異儀初約經示意二正顯異儀三校量緩急三道俗敬相初約經總告二據位正明初俗初標顯所由二列示相狀三示拜多少四結指文義二道初通明能敬軌儀二別示所敬勝境三重約行事校量初依教示相初約義總示初約身心總標二約事理開釋三約唯識融會二依經顯相二習儀起行二依經顯相初經列十條初敘意列名二律明五法二依名別釋三結示不盡初